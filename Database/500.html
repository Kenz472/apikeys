<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 - Kesalahan Server Internal</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

#canvas-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
}

.glitch-wrapper {
    position: relative;
    display: inline-block;
}

.glitch {
    font-size: 150px;
    font-weight: 900;
    letter-spacing: 10px;
    position: relative;
    color: #fff;
    animation: glitch-skew 3s infinite linear alternate-reverse;
}

.glitch::before,
.glitch::after {
    content: "500";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.glitch::before {
    left: 2px;
    text-shadow: -2px 0 #ff3333;
    clip: rect(44px, 450px, 56px, 0);
    animation: glitch-anim 5s infinite linear alternate-reverse;
}

.glitch::after {
    left: -2px;
    text-shadow: -2px 0 #ff8800;
    clip: rect(44px, 450px, 56px, 0);
    animation: glitch-anim2 5s infinite linear alternate-reverse;
}

@keyframes glitch-anim {
    0% { clip: rect(31px, 9999px, 94px, 0); }
    10% { clip: rect(112px, 9999px, 76px, 0); }
    20% { clip: rect(85px, 9999px, 77px, 0); }
    30% { clip: rect(27px, 9999px, 97px, 0); }
    40% { clip: rect(64px, 9999px, 98px, 0); }
    50% { clip: rect(61px, 9999px, 85px, 0); }
    60% { clip: rect(99px, 9999px, 114px, 0); }
    70% { clip: rect(34px, 9999px, 115px, 0); }
    80% { clip: rect(98px, 9999px, 129px, 0); }
    90% { clip: rect(43px, 9999px, 96px, 0); }
    100% { clip: rect(82px, 9999px, 64px, 0); }
}

@keyframes glitch-anim2 {
    0% { clip: rect(65px, 9999px, 100px, 0); }
    10% { clip: rect(121px, 9999px, 82px, 0); }
    20% { clip: rect(93px, 9999px, 71px, 0); }
    30% { clip: rect(35px, 9999px, 91px, 0); }
    40% { clip: rect(72px, 9999px, 92px, 0); }
    50% { clip: rect(69px, 9999px, 79px, 0); }
    60% { clip: rect(107px, 9999px, 108px, 0); }
    70% { clip: rect(42px, 9999px, 109px, 0); }
    80% { clip: rect(106px, 9999px, 123px, 0); }
    90% { clip: rect(51px, 9999px, 90px, 0); }
    100% { clip: rect(90px, 9999px, 58px, 0); }
}

@keyframes glitch-skew {
    0% { transform: skew(0deg); }
    10% { transform: skew(-2deg); }
    20% { transform: skew(2deg); }
    30% { transform: skew(0deg); }
    40% { transform: skew(1deg); }
    50% { transform: skew(-1deg); }
    60% { transform: skew(0deg); }
    70% { transform: skew(-2deg); }
    80% { transform: skew(2deg); }
    90% { transform: skew(0deg); }
    100% { transform: skew(-1deg); }
}

.subtitle {
    font-size: 24px;
    margin-top: 20px;
    color: #ff4444;
    letter-spacing: 5px;
    text-transform: uppercase;
    animation: fadeInUp 1s ease-out;
}

.description {
    font-size: 16px;
    margin-top: 15px;
    color: #888;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
    animation: fadeInUp 1.2s ease-out;
}

.btn-home {
    display: inline-block;
    margin-top: 40px;
    padding: 15px 40px;
    background: transparent;
    color: #fff;
    text-decoration: none;
    border: 2px solid #ff4444;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 1.4s ease-out;
}

.btn-home::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: #ff4444;
    transition: all 0.3s ease;
    z-index: -1;
}

.btn-home:hover::before {
    left: 0;
}

.btn-home:hover {
    color: #0a0a0a;
}

.scan-line {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: rgba(255, 68, 68, 0.1);
    animation: scan 3s linear infinite;
    z-index: 100;
    pointer-events: none;
}

@keyframes scan {
    0% { top: -5px; }
    100% { top: 100vh; }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.noise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

.error-icon {
    font-size: 60px;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@media (max-width: 768px) {
    .glitch {
        font-size: 80px;
    }
    .subtitle {
        font-size: 18px;
    }
    .description {
        font-size: 14px;
        padding: 0 20px;
    }
    .error-icon {
        font-size: 40px;
    }
}
</style>
<base target="_blank">
</head>
<body>
<canvas id="canvas-bg"></canvas>
<div class="noise"></div>
<div class="scan-line"></div>
<div class="container">
    <div class="error-icon">&#9888;</div>
    <div class="glitch-wrapper">
        <div class="glitch">500</div>
    </div>
    <div class="subtitle">Kesalahan Server Internal</div>
    <div class="description">
        Server mengalami masalah yang tidak dapat diproses saat ini. 
        Tim teknis kami sedang bekerja untuk memperbaikinya. Silakan coba lagi nanti.
    </div>
    <a href="/" class="btn-home">Muat Ulang Halaman</a>
</div>

<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');

let width, height;
let particles = [];
const particleCount = 100;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

class Particle {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = Math.random() * 2;
        this.alpha = Math.random() * 0.5 + 0.1;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
            this.reset();
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 68, 68, ${this.alpha})`;
        ctx.fill();
    }
}

function init() {
    resize();
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
}

function animate() {
    ctx.clearRect(0, 0, width, height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 150) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(255, 68, 68, ${0.1 * (1 - dist / 150)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
init();
animate();

const glitchText = document.querySelector('.glitch');
document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;
    glitchText.style.transform = `translate(${x}px, ${y}px)`;
});
</script>
</body>
</html>
